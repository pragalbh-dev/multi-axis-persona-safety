# Phase A — Plan B replay on Qwen 3 32B (subject 2 of 4 per may_3_directive.md).
#
# Differences from configs/plan_b.yaml (Gemma 2 27B):
#   - model_id + output_dir + judge skip per Gate 2 amendment
#   - capping range from configs/paper_capping_ranges.yaml (paper publishes Qwen 3 32B verbatim)
#   - expected_l_star left null; resolved at runtime by argmax cos_sim(PC1, AA) per layer
#   - n_dan_prompts kept at 500 (Plan B precedent; revisit per Phase A wall-clock measurement)
#   - GPT-5.5 step skipped — cross-judge dropped per may_3_directive.md amendment 2026-04-30
#
# Hardware: 1× RTX PRO 6000 Blackwell 96 GB. TP auto-clamps to 1 at load time
# via src.utils.config.load_subjects(). gpu_memory_utilization=0.90 from
# subjects.yaml. KV cache budget tight (~17 GB after weights at gmu=0.90); the
# Gate 2 smoke load gates max_model_len.

experiment_id: phase_a_qwen_3_32b
seed: 42
output_dir: results/phase_a/qwen_3_32b

# ── Subject ────────────────────────────────────────────────────────────────
model_id: qwen_3_32b
dtype: bf16
tensor_parallel: 1                # post-amendment 2026-04-30 (was 4)

# ── Volumes (Plan B parity; revisit at Phase A kickoff if wall-clock blows budget) ──
n_dan_prompts: 500
n_role_rollouts_per_role: 30
n_default_assistant_rollouts: 50
n_random_baselines: 5

# ── Extraction ────────────────────────────────────────────────────────────
expected_l_star: null             # resolve at runtime via per-layer cos_sim(PC1, AA) argmax
extraction_layers_for_pca: null   # null = all 64 layers
top_k_pcs: 10

# ── Capping ───────────────────────────────────────────────────────────────
# Paper publishes Qwen 3 32B verbatim: layers 46-53, center 49.5, width 8,
# τ=25th percentile. See configs/paper_capping_ranges.yaml.
# capping_center_offset_from_lstar/width are kept compatible with Plan B's
# orchestrator, but the paper-verbatim layers override at Step 4 read time.
capping_center_offset_from_lstar: null   # paper-verbatim path (not L*-relative)
capping_width: 8
capping_layers_explicit: [46, 53]
tau_percentile: 25

# ── Steering ──────────────────────────────────────────────────────────────
# Lambda inherited from Plan B precedent (0.25 = coherence-preserving on Gemma 2 27B).
# Phase A may need to re-tune per Qwen 3 32B's residual norm. Acceptance criterion
# downstream is "any nonzero recovery with CI excluding zero" — recalibrate if 0.25
# overshoots.
pc_indices_to_steer: [2, 3]
steering_lambdas: [0.25]
random_baseline_lambda: 0.25

# ── Generation profiles ───────────────────────────────────────────────────
extraction_profile: short
baseline_profile: long
hf_steered_batch_size: 8
hf_steered_max_input_len: 4096
max_new_tokens: 256

# ── Judge ─────────────────────────────────────────────────────────────────
judge_model_id: qwen_3_6_27b
judge_prompt_path: configs/judge_prompt.yaml

# ── Cross-judge: DROPPED per may_3_directive amendment 2026-04-30 ─────────
# Step 8 (GPT-5.5 validation) skipped via --skip 8 at runtime. Block kept here
# as a documentation anchor; do not re-enable without a decisions.md entry.
gpt55_validation:
  enabled: false                  # honored by step_8 if it checks; CLI --skip 8 is the belt + braces
  reason: "cross-judge dropped per may_3_directive amendment 2026-04-30"

mvp_only: true

# ── Acceptance criteria ──────────────────────────────────────────────────
acceptance:
  aa_cap_min_reduction_pp: 30.0
  pc_recovery_min_pp: 10.0
  random_recovery_max_pp: 5.0
  pc1_aa_cos_sim_min: 0.7
  blind_spot_auc_lift_min: 0.02
  judge_agreement_min: 0.85
