# Phase B — Attack arm for Qwen 3 32B (subject 1 of 3 per may_3_directive.md).
#
# Reads Phase A artifacts under results/phase_a/qwen_3_32b/extraction/
# (AA, PCs at L*=11, tau, lmsys_norm). Hardware: 1× RTX PRO 6000 Blackwell 96 GB,
# TP=1. Steered backend = SGLang via .venv-sglang.

experiment_id: phase_b_qwen_3_32b
subject_id: qwen_3_32b
seed: 42
output_dir: results/phase_b/qwen_3_32b

# Subject + Phase A
model_id: qwen_3_32b
phase_a_dir: results/phase_a/qwen_3_32b
# (activation_cache_path auto-resolves from L_star.txt → plan_b_per_prompt_L11)

# Attack configuration
pc_indices_to_attack: [2, 3]      # paper-aligned + Phase A's lasso-selected top
include_v_harm_attack: true
include_adversarial_null_space: true
n_random_baselines: 2
multi_axis_pc_indices: [2, 3]

# Adaptive λ search (Ext F coherence-matched sweep)
lambda_schedule: [0.05, 0.10, 0.15, 0.20, 0.25]
coherence_floor: 0.80

# Mini subset: 25 harm-pos + 25 harm-neg (Phase A had 43 harm-pos / 500)
mini_n_per_stratum: 25

# Generation
hf_steered_batch_size: 8
hf_steered_max_input_len: 4096
max_new_tokens: 256              # matches Phase A baseline (Qwen 3 32B, thinking OFF)

# Judge
judge_model_id: qwen_3_6_27b
judge_prompt_path: configs/judge_prompt.yaml
