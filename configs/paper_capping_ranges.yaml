# Paper's per-model PC1 / Assistant Axis capping layer ranges.
#
# Source: Lu et al. 2601.10387 §5.1.2 (line 691 in our extracted copy), Figure 10,
# Appendix F. These are the ranges they reproduce as their paper-best capping
# configs. Stage 4 T4.0 uses these verbatim for Tier 1 reproduction, then sweeps
# fresh on Tier 2 subjects (Gemma 4 31B) per CONVENTIONS "Layer-scope convention".
#
# Format per subject:
#   center            — midpoint layer index (float)
#   width             — number of layers covered by the range
#   layers            — explicit [start, end] inclusive
#   tau_percentile    — τ percentile of rollout-projection distribution (paper's 25th default)
#   n_layers_total    — model's total transformer block count (for sanity check)
#
# Notes:
#   - Capping is applied at all token positions (prompt + response).
#   - Capping formula: h <- h - v * min(<h, v> - tau, 0), v = unit AA direction,
#     scaled to lmsys-chat-1m mean residual-stream norm at the layer
#     (per CONVENTIONS Scientific conventions).
#   - Extraction layer is UNRELATED to capping range per paper — they are
#     independently swept. Extraction layer is where PCA/AA are fit (argmax
#     cos_sim(PC1, AA) via per-layer sweep, ~middle layer).

qwen_3_32b:
  center: 49.5
  width: 8
  layers: [46, 53]
  tau_percentile: 25
  n_layers_total: 64
  source: "paper §5.1.2 line 691 + Figure 10"

