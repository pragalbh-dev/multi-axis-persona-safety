# Paper's per-model PC1 / Assistant Axis capping layer ranges.
#
# Source: Lu et al. 2601.10387 §5.1.2 (line 691 in our extracted copy), Figure 10,
# Appendix F. These are the ranges they reproduce as their paper-best capping
# configs. Stage 4 T4.0 uses these verbatim for Tier 1 reproduction, then sweeps
# fresh on Tier 2 subjects (Gemma 4 31B) per CONVENTIONS "Layer-scope convention".
#
# Format per subject:
#   center            — midpoint layer index (float)
#   width             — number of layers covered by the range
#   layers            — explicit [start, end] inclusive
#   tau_percentile    — τ percentile of rollout-projection distribution (paper's 25th default)
#   n_layers_total    — model's total transformer block count (for sanity check)
#
# Notes:
#   - Capping is applied at all token positions (prompt + response).
#   - Capping formula: h <- h - v * min(<h, v> - tau, 0), v = unit AA direction,
#     scaled to lmsys-chat-1m mean residual-stream norm at the layer
#     (per CONVENTIONS Scientific conventions).
#   - Extraction layer is UNRELATED to capping range per paper — they are
#     independently swept. Extraction layer is where PCA/AA are fit (argmax
#     cos_sim(PC1, AA) via per-layer sweep, ~middle layer).

qwen_3_32b:
  center: 49.5
  width: 8
  layers: [46, 53]
  tau_percentile: 25
  n_layers_total: 64
  source: "paper §5.1.2 line 691 + Figure 10"

llama_3_3_70b:
  center: 63.5
  width: 16
  layers: [56, 71]
  tau_percentile: 25
  n_layers_total: 80
  source: "paper §5.1.2 line 691 + Figure 10"
  status: "deferred — Stage 7 Ext 9 (hardware-gated, needs 4 GPUs)"

gemma_2_27b:
  # CONFIRMED 2026-04-25 via grep of paper extracted.md: paper does NOT publish a
  # Gemma 2 27B capping range. Appendix F (line 3405) only contains the Qwen 3 32B
  # Pareto frontier (Figure 26). §5.1.2 (line 691) and Figure 10 (line 712) only
  # cite Qwen 46-53 and Llama 56-71 explicitly. Gemma 2 27B is used in steering
  # experiments (Appendix D.2.3) but not in the §5 activation capping evaluations.
  #
  # Plan B fallback per directive: center = L* + 6, width = 8, τ = 25th percentile
  # at the chosen capping layer. L* is determined at runtime by the cos_sim(PC1, AA)
  # argmax sweep (Plan B Step 2). For Gemma 2 27B with 46 layers, expected L* ≈ 22-24,
  # so capping range = [L*+2, L*+9] ≈ [24, 33] — middle-to-late depths per paper convention.
  # The Stage 4 T4.0 2D sweep replaces this with measured optima during the post-deadline
  # multi-subject sweep.
  center_offset_from_lstar: 6      # Plan B heuristic: capping center sits 6 layers deeper than L*
  width: 8                         # paper convention for ~27-32B models (Qwen also used 8)
  layers: null                     # filled at runtime: [L*+2, L*+9]
  tau_percentile: 25               # paper line 685 default
  n_layers_total: 46
  status: "PAPER DID NOT PUBLISH — Plan B uses L*+6 ± 4 heuristic; Stage 4 T4.0 replaces with 2D sweep post-deadline"
  source: "Plan B directive 2026-04-25 (heuristic); Stage 4 T4.0 (post-deadline 2D sweep)"

# Tier 2 subjects run their own 2D sweep in Stage 4 T4.0.
gemma_4_31b_thinking_off:
  status: "sweep in Stage 4 T4.0 — centers {40%,50%,60%,70%,80%} of 60, widths {4,8,16,24}, τ {1,10,25,50,75}th"
  n_layers_total: 60
gemma_4_31b_thinking_on:
  status: "sweep in Stage 4 T4.0 — same grid as thinking-off; plus thinking-token vs answer-token scoped variants"
  n_layers_total: 60
