# Per (family, profile) inference config — chosen by grid search.
#
# Source: results/inference_grid/_summary_<family>__<profile>.json
# Grid script: scripts/inference_grid_search.py (binary descent on max_num_seqs,
# 4 outer cells × {gmu, enforce_eager}, 30-prompt realistic workload from eval data).
# All measurements: bf16, TP=4, 4× RTX 5090, vLLM 0.19.1 + CUDA graphs (cudagraph_capture_sizes default).
#
# Where the winner was at the VRAM edge (≥133 GB / 134 GB total = ≈33 GB/GPU
# of 32 GB cap, indicating allocator pressure), we picked the runner-up that
# gave equivalent throughput (within 1%) but with 15-20 GB more headroom.
# Always use enforce_eager=False (CUDA graphs give 1.5-2.2× speedup).
#
# A profile defines: max_model_len + which datasets feed it.
#   short    max_model_len=2048: IFEval, GSM8k, MMLU-Pro, EQ-Bench, extraction questions
#   long     max_model_len=8192: DAN jailbreak (subject rollouts only)
#   judge    max_model_len=4096: 9-cat harm + 3-label role-expression on a shared template prefix

defaults:
  enforce_eager: false              # CUDA graphs mandatory; eager always loses
  trust_remote_code: false          # subject-specific override below
  attention_backend: null           # use vLLM default (TRITON_ATTN typical)
  enable_prefix_caching: false      # only judge enables it (shared template)

# ── SGLang server defaults (post-Plan-B spike, 2026-04-30) ─────────────────────
# All hook-enabled SGLang launches must:
#   - export CUDA_HOME=/usr/local/cuda PATH=/usr/local/cuda/bin:$PATH
#     (sgl_kernel JIT compiles for sm_120 — needs nvcc on PATH)
#   - export SGLANG_ENABLE_JIT_DEEPGEMM=False (deep_gemm cuda_home assert fails on this host)
#   - pass --disable-piecewise-cuda-graph (regular CUDA graphs still active; piecewise
#     traces 58 dynamic shape variants when hooks are present, costing ~12 min/launch)
#   - pass --attention-backend triton (FlashInfer fused rmsnorm doesn't dispatch under hooks)
#   - pass --mem-fraction-static 0.85 (matches HF KV-cache headroom)
#
# `model_path` (for --model-path) reuses the subject's `hf_id`. Hook target_modules
# use the subject's `layer_module_glob_prefix` (configs/subjects.yaml).
sglang_defaults:
  port: 30000
  tp: 1
  dtype: bfloat16
  mem_fraction_static: 0.85
  attention_backend: triton
  disable_piecewise_cuda_graph: true
  startup_log_marker: "Application startup complete"
  startup_timeout_seconds: 600
  request_concurrency: 32                # aiohttp connector limit; SGLang handles continuous batching internally
  # request_timeout_seconds is per-request from session.post() entry. Because
  # asyncio.gather submits all N tasks at once and the connector caps to 32
  # active, the (N - 32) backlogged tasks start their own 600s clock while
  # waiting for a connection slot. Phase E pushes 1712 prompts through Qwen 3 /
  # Gemma 4 with capping hooks at ~200-400 tok/s — backlog wait alone exceeds
  # 600s after batch ~12-19 of 32. Bumped to 7200 (2 hr) to safely cover Phase
  # E's queue depth. Phase B's 508-prompt subsets fit under 600s, so this is
  # purely additive ceiling. (2026-05-04 cell 4/9 timeout, plans/decisions.md).
  request_timeout_seconds: 7200
  env:
    SGLANG_ENABLE_JIT_DEEPGEMM: "False"
    CUDA_HOME: /usr/local/cuda

