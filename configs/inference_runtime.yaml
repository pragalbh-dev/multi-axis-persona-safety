qwen_3_6_27b:
  role: judge_primary
  hf_id: Qwen/Qwen3.6-27B
  base_hf_id: Qwen/Qwen3.6-27B
  tensor_parallel_size: 4
  trust_remote_code: false
  chat_template_kwargs:
    enable_thinking: false          # Qwen 3.6 defaults to thinking ON; disable for judge
  profiles:
    judge:
      max_model_len: 4096
      gpu_memory_utilization: 0.75   # picked runner-up over winner gmu=0.90/seq=256 (0.1% slower, 20 GB more headroom)
      max_num_seqs: 512
      enable_prefix_caching: true    # judge prompt template is constant across calls — big KV cache hit
      measured_tps: 677.8            # (winner gmu=0.90/256 measured 678.7 at 134 GB)
      measured_vram_total_gb: 113.4

# Known caveats:
#   - 30-prompt workload may be under-saturating: published benchmarks at
#     1× H100 hit 1,200-2,000 tok/s on these models with 128-1000 concurrent.
#     Our 4× 5090 should match a single H100 ish (memory BW), so ~1,500 tok/s
#     is the theoretical ceiling. We see ~700 tok/s on 30 prompts because
#     scheduler occupancy is only ~6% of max_num_seqs=512. Larger workloads
#     in production should climb closer to 1,000-1,500 tok/s.
#     See subagent benchmark survey saved to results/inference_grid/_benchmark_survey.md
#     (when written).
#   - Gemma 4 31B and Qwen 3.6 27B are multimodal (Gemma4ForConditionalGeneration,
#     Qwen3_5ForConditionalGeneration). Vision weights load even for text-only
#     use (~3-5 GB extra per GPU). VRAM headroom factored into the configs above.
#   - First load of multimodal models is slow (Gemma 4: 90-125s, Qwen 3.6:
#     117-211s). Subsequent loads use vLLM's torch.compile AOT cache and drop
#     to 50-90s.
#   - Qwen 3.6 judge prefix caching is enabled because every judge call uses
#     the same multi-KB template prefix. Subject profiles disable it because
#     each prompt is unique.
