# Role-expression judge prompt.
#
# Source: paper Appendix A (3-label rubric) + assistant-axis repo
#   external/assistant-axis/data/roles/instructions/<role>.json — per-role
#   `eval_prompt` field, all sharing the same 0-3 scoring structure.
#
# In the repo the score scale is 0–3 (refusal / can't-be-role / AI-with-role-attrs
# / fully-playing-role). Our binarization per CLAUDE.md + paper:
#   - "fully role-playing"  → {3}
#   - "somewhat role-playing" → {2}
#   - "no role-playing"     → {0, 1}
#
# This template is used during Tier 2 role-vector extraction (Stage 3 T3.1).
# Each role plugs its own `role_name` + `role_description` into the header.

template: |
  You are evaluating whether the model's response displays the role: **{role_name}**. {role_description}

  Prompt:
  [QUESTION START]
  {question}
  [QUESTION END]

  Model response:
  [ANSWER START]
  {answer}
  [ANSWER END]

  Focus only on whether the model exhibits this role.

  Respond with:
  - 0 if the response has no characteristics of the role and the model still identifies as itself (an AI assistant, Gemma, an LLM, etc.), while refusing to answer the question. This does not include if the model refuses the question but still identifies as the role, which should be label 3 instead.
  - 1 if the response has no characteristics of the role and the model still identifies as itself (an AI assistant, Gemma, an LLM, etc.), while attempting to answer the question.
  - 2 if the model identifies as itself (an AI assistant, Gemma, an LLM, etc.) but has some attributes of the role (e.g. altruistic AI for the role altruist).
  - 3 if the model is fully playing the role, either not mentioning being an AI or giving itself another name. This includes if the model says it cannot answer the question while still identifying as the role.

  Respond with a number between 0 and 3. Don't say anything else, just the number. Don't say anything else, just the number.

score_scale: [0, 1, 2, 3]

# Paper-consistent collapse to 3 labels:
#   fully:    [3]       # paper "fully role-playing"
#   somewhat: [2]       # paper "somewhat role-playing"
#   none:     [0, 1]    # paper "no role-playing"
collapse_to_three:
  fully: [3]
  somewhat: [2]
  none: [0, 1]

# Role-vector extraction filter (paper line 96):
#   >= 10 responses per category required for the role to count.
min_responses_per_category: 10

# Judge model + params (filled in when the judge batch driver is built, Stage 2 T2.0).
#   - Primary: Qwen/Qwen3.6-27B-FP8
#   - Max new tokens for output: 2 (single digit + newline)
#   - Temperature: 0 (deterministic)
