# Phase A — Plan B replay on Gemma 4 31B (thinking OFF), subject 4 of 4 per may_3_directive.md.
#
# Differences from configs/plan_b.yaml (Gemma 2 27B):
#   - model_id resolves to subjects.yaml::gemma_4_31b_thinking_off (added 2026-04-30)
#     which carries chat_template_kwargs.enable_thinking=false
#   - capping range NOT in paper for Gemma 4 31B — Stage 4 T4.0 protocol is a 2D
#     sweep (centers {40,50,60,70,80}% × widths {4,8,16,24} × τ {1,10,25,50,75}th).
#     For Phase A's reproduction baseline we use a single conservative pick:
#     center 50% (layer 30) + width 8 + τ=25th. The full 2D sweep is Phase B.
#   - GPT-5.5 step skipped (cross-judge dropped per amendment).
#
# Hardware: 1× RTX PRO 6000 Blackwell 96 GB, TP=1.
# Steered backend = HF (SGLang 0.5.10 unsupported per spike 2026-04-30).
# Verified at TP=1 by SGLang spike: 94.55/96 GB used at gmu=0.90 — fits.

experiment_id: phase_a_gemma_4_31b_thinking_off
seed: 42
output_dir: results/phase_a/gemma_4_31b_thinking_off

model_id: gemma_4_31b_thinking_off
dtype: bf16
tensor_parallel: 1

n_dan_prompts: 500
n_role_rollouts_per_role: 30
n_default_assistant_rollouts: 50
n_random_baselines: 5

expected_l_star: null
extraction_layers_for_pca: null   # null = all 60 layers
top_k_pcs: 10

# ── Capping (single pick; full 2D sweep deferred to Phase B / Stage 4 T4.0) ──
capping_center_offset_from_lstar: null
capping_width: 8
capping_layers_explicit: [27, 34]    # center 30 = 50% of 60 layers, width 8
tau_percentile: 25

pc_indices_to_steer: [2, 3]
steering_lambdas: [0.25]
random_baseline_lambda: 0.25

extraction_profile: short
baseline_profile: long
hf_steered_batch_size: 8
hf_steered_max_input_len: 4096
max_new_tokens: 256

judge_model_id: qwen_3_6_27b
judge_prompt_path: configs/judge_prompt.yaml

gpt55_validation:
  enabled: false
  reason: "cross-judge dropped per may_3_directive amendment 2026-04-30"

mvp_only: true

acceptance:
  aa_cap_min_reduction_pp: 30.0
  pc_recovery_min_pp: 10.0
  random_recovery_max_pp: 5.0
  pc1_aa_cos_sim_min: 0.7
  blind_spot_auc_lift_min: 0.02
  judge_agreement_min: 0.85
